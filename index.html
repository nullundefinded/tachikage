<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TACHIKAGE</title>

<style>
body {
  margin: 0;
  background: #02080e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: sans-serif;
}

.game-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 8px;
}

.top-ui {
  width: 800px;
  display: flex;
  justify-content: space-between;
}

canvas {
  border: 2px solid white;
  background: #02080e;
  cursor: default;
}

#dialogue-ui {
  border: none;
}

#config-reset-ui {
  visibility: hidden;
}
</style>
</head>

<body>

<div class="game-wrap">
  <div class="top-ui">
    <canvas id="debug-ui" width="130" height="28"></canvas>
    <canvas id="config-reset-ui" width="130" height="28"></canvas>
  </div>
  <canvas id="game" width="800" height="450"></canvas>
  <canvas id="dialogue-ui" width="800" height="120"></canvas>
</div>

<script src="js/assets.js"></script>
<script src="js/storyLines.js"></script>
<script src="js/adv.js"></script>
<script src="js/config.js"></script>
<script src="js/gameNav.js"></script>
<script src="js/tutorial.js"></script>
<script src="js/effects.js"></script>
<script src="js/player.js"></script>
<script src="js/bullets.js"></script>
<script src="js/stake.js"></script>
<script src="js/perf.js"></script>
<script src="js/screens.js"></script>
<script src="js/ui.js"></script>
<script src="js/boss.js"></script>
<script src="js/bossAttack.js"></script>
<script src="js/bossMovement.js"></script>
<script src="js/bossDraw.js"></script>
<script src="js/bossGameNav.js"></script>
<script src="js/game.js"></script>
<script src="js/input.js"></script>
</body>
</html>
